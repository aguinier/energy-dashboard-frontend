services:
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: energy-dashboard-frontend
    ports:
      - "3001:3001"
    environment:
      - ENERGY_DB_PATH=/data/energy_dashboard.db
    volumes:
      # rw (not :ro) — SQLite WAL mode needs to create/maintain -shm and -wal sidecars
      # in the DB directory even for read-only queries.
      - ${DB_DIR:-../../data_gathering}:/data
    restart: unless-stopped
